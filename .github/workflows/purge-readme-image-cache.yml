name: Purge image cache

on:
  schedule:
    - cron: '4 18 * * */7'

jobs:
  purge:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions: {}
    steps:
      - run: |
          curl -sL "https://github.com/${GITHUB_REPOSITORY}" |
          grep -oE '<img src="https?://camo.githubusercontent.com/[^"]+' |
          sed -e 's/<img src="//' |
          xargs -r -I % curl -sX PURGE %
